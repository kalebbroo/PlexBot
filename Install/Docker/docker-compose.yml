name: PlexBot

volumes:
  # Shared volume for generated Lavalink config (lavalink-init → lavalink)
  lavalink-config:

services:
  # PlexBot Service
  plexbot:
    container_name: PlexBot
    image: ghcr.io/plexbot/plexbot:latest
    build:
      context: ../..  # This points to the project root from Docker folder
      dockerfile: Install/Docker/dockerfile
    restart: unless-stopped
    depends_on:
      - lavalink
    volumes:
      - ../..:/source  # Mount project root as /source
      - ../../data:/app/data
      - ../../logs:/app/logs
      - ../../.env:/app/.env  # Mount directly to app root
      # config.fds is auto-created from template by startup.sh if missing.
      # Uncomment to persist custom settings across container rebuilds:
      # - ../../config.fds:/app/config.fds
      - ../../Images:/app/Images
    environment:
      - DOTNET_ENVIRONMENT=Production
      - EXTENSIONS_SOURCE_DIR=/source/Extensions
    env_file:
      - ../../.env
    networks:
      - plexbot-network

  # Generates Lavalink config from base template + extension plugin fragments.
  # Runs once on every `docker compose up`, then exits. Lavalink waits for it.
  lavalink-init:
    container_name: LavaLink-Init
    image: mikefarah/yq:latest
    user: "0:0"  # yq image runs as non-root by default; needs root to write to the shared volume
    volumes:
      - ../../Extensions:/extensions:ro
      - ./lavalink.base.yml:/config/base.yml:ro
      - ./generate-lavalink-config.sh:/config/generate.sh:ro
      - lavalink-config:/output
    entrypoint: ["sh", "/config/generate.sh", "/extensions", "/output", "/config/base.yml"]
    restart: "no"
    networks:
      - plexbot-network

  # Lavalink Service
  lavalink:
    container_name: LavaLink
    image: ghcr.io/lavalink-devs/lavalink:4
    restart: unless-stopped
    depends_on:
      lavalink-init:
        condition: service_completed_successfully
    env_file:
      - ../../.env
    environment:
      # Map PlexBot env vars to what the Lavalink container expects
      - SERVER_PORT=${LAVALINK_SERVER_PORT:-2333}
      - SERVER_ADDRESS=0.0.0.0
      - LAVALINK_SERVER_PASSWORD=${LAVALINK_SERVER_PASSWORD:-youshallnotpass}
      # JVM tuning — uncomment _JAVA_OPTIONS in .env to enable ZGC (reduces audio stuttering)
      - _JAVA_OPTIONS=${_JAVA_OPTIONS:-}
      # Disable Spring Cloud Config — Lavalink uses a local file, not a config server
      - SPRING_CLOUD_CONFIG_ENABLED=false
      # Read generated config from the shared volume (written by lavalink-init)
      - SPRING_CONFIG_LOCATION=file:///opt/Lavalink/config/lavalink.application.yml
    volumes:
      - lavalink-config:/opt/Lavalink/config:ro
      - ./plugins:/opt/Lavalink/plugins
      - ../../logs/lavalink:/opt/Lavalink/logs
    ports:
      - "${LAVALINK_SERVER_PORT:-2333}:${LAVALINK_SERVER_PORT:-2333}"
    # --- Optional: CPU Pinning & Priority ---
    # Reserves dedicated CPU cores for Lavalink so other processes on the host
    # cannot starve its audio thread. Lavalink must send an Opus frame every 20ms;
    # if the OS scheduler preempts it (e.g. when opening a browser), you hear a stutter.
    # Only uncomment if you experience audio stuttering and are running other
    # workloads on the same machine.
    # Tradeoffs:
    #   - cpuset pinning makes those cores unavailable to other containers
    #   - cpu_shares only affects scheduling under contention, no impact when idle
    # cpuset: "0,1"        # Pin Lavalink to CPU cores 0 and 1
    # cpu_shares: 2048      # Double default priority (1024) under CPU contention
    networks:
      - plexbot-network

networks:
  plexbot-network:
    name: plexbot-network
    driver: bridge